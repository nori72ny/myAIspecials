name: ACOS 2.0 Quality Gate

on:
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

jobs:
  quality-gate:
    name: Verify Quality & Code Guidelines
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout Codebase
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: Setup Node.js Environment
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
          cache: 'npm'

      - name: Install Base Dependencies
        run: npm ci

      - name: Run TypeScript & Design Token Lock Linter
        run: npm run lint

      - name: Run Core Unit Tests
        run: npm run test

      - name: Run Integration API Tests
        run: npm run test:api

      - name: Validate Production Build
        run: npm run build
