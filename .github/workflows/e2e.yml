name: ACOS 2.0 E2E Testing Pipeline

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main", "develop" ]
  workflow_dispatch:

jobs:
  test-e2e:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    
    env:
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: 'npm'
        
    - name: Install dependencies
      run: npm ci
      
    - name: Build Application
      run: npm run build
      
    - name: Install Playwright Browsers
      run: npx playwright install --with-deps chromium
      
    - name: Run Jest API Lifecycle Tests (with Coverage)
      run: npm run test:api
      
    - name: Run Playwright E2E UI Tests
      run: npm run test:e2e
      
    - name: Upload Playwright HTML Report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 30
        
    - name: Upload Jest HTML Report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: jest-html-report
        path: results/jest-report.html
        retention-days: 30
        
    - name: Upload JUnit XML Reports
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: junit-results
        path: results/*.xml
        retention-days: 30
        
    - name: Upload Coverage Reports
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: coverage-reports
        path: coverage/
        retention-days: 30
