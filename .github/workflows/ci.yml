name: ACOS CI

on:
  push:
    branches:
      - main
      - develop

  pull_request:

jobs:

  build:

    runs-on: ubuntu-latest

    steps:

      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: npm install

      - run: npm run lint

      - run: npm run build

      - run: npm run test

      - run: npx playwright install --with-deps chromium

      - run: npm run test:e2e
