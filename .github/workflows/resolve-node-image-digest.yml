name: Resolve Node Image Digest

on:
  push:
    branches:
      - sprint-7-6/deployment-readiness
    paths:
      - .github/workflows/resolve-node-image-digest.yml

permissions:
  contents: read

jobs:
  resolve:
    runs-on: ubuntu-latest
    steps:
      - name: Resolve node:22-alpine digest
        run: docker buildx imagetools inspect node:22-alpine --format '{{json .Manifest.Digest}}'
