name: Sprint 8.4 Temporary Diagnostics

on:
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  diagnose-lint:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 22.x
          cache: npm
      - name: Install dependencies quietly
        run: npm ci --silent
      - name: TypeScript diagnostics
        run: npx tsc --noEmit --pretty false
      - name: Design token diagnostics
        run: node scripts/design-token-lock.js
