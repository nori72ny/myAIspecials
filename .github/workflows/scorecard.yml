name: "OpenSSF Scorecard"

on:
  # For Branch-Protection check. Only the default branch is supported. See
  # https://github.com/ossf/scorecard-action#branch-protection
  branch_protection_rule:
  # To guarantee Maintained check is occasionally updated. See
  # https://github.com/ossf/scorecard-action#maintained
  schedule:
    - cron: '20 7 * * 2'
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

# Declare default permissions as read only.
permissions: read-all

jobs:
  analysis:
    name: Scorecard Analysis
    runs-on: ubuntu-latest
    permissions:
      # Needed to upload the results to code-scanning dashboard.
      security-events: write
      # Needed to publish results and get a badge (see publish_results below).
      id-token: write
      # Needed to detect GitHub Actions secrets
      actions: read
      contents: read

    steps:
      - name: "Checkout code"
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: "Run analysis"
        uses: ossf/scorecard-action@v2.4.0
        with:
          results_file: results.sarif
          results_format: sarif
          # (Optional) "write" fine-grained personal access token or "github_token"
          # with "public_repo" scope or OAuth token.
          # To benefit from the Branch-Protection check, you can use a personal access token.
          # If not set, Scorecard will skip branch protection.
          publish_results: true

      # Upload the results as artifacts.
      - name: "Upload artifact"
        uses: actions/upload-artifact@v4
        with:
          name: OpenSSF Scorecard SARIF
          path: results.sarif
          retention-days: 5

      # Upload the results to GitHub's code scanning dashboard.
      - name: "Upload to code-scanning"
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: results.sarif
