name = "acos-2-staging-api"
main = "worker/index.mjs"
compatibility_date = "2026-07-14"
workers_dev = true

[vars]
FREE_ONLY = "true"
OPENROUTER_FREE_MODEL = "google/gemini-2.5-flash:free"
APP_URL = "https://acos-staging.pages.dev"

# OPENROUTER_API_KEY must be added with `wrangler secret put`.
# Do not add paid-provider keys or enable a paid Workers plan.
